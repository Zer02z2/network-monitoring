<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --green:     #3fb950;
      --blue:      #58a6ff;
      --yellow:    #d29922;
      --red:       #f85149;
      --purple:    #a371f7;
      --orange:    #f0883e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 0.04em;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

    .stat-chips {
      display: flex;
      gap: 10px;
      margin-left: auto;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--muted);
    }
    .chip span { color: var(--text); font-weight: 600; }

    /* ── Known IPs bar ── */
    #ip-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 32px;
      flex-shrink: 0;
    }
    #ip-bar .label { color: var(--muted); font-size: 11px; }
    .ip-tag {
      background: var(--surface2);
      border: 1px solid var(--blue);
      color: var(--blue);
      border-radius: 3px;
      padding: 1px 7px;
      font-size: 11px;
    }

    /* ── Table wrapper ── */
    #table-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
    }
    #table-wrapper::-webkit-scrollbar { width: 6px; height: 6px; }
    #table-wrapper::-webkit-scrollbar-track { background: var(--bg); }
    #table-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface2);
    }
    th {
      padding: 7px 10px;
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    td {
      padding: 5px 10px;
      border-bottom: 1px solid #1c2128;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }
    tr { transition: background 0.1s; }
    tr:hover td { background: var(--surface2); }

    /* row type colors */
    tr.new-ip td:first-child { border-left: 2px solid var(--yellow); }
    tr.traffic td:first-child { border-left: 2px solid transparent; }

    /* badges */
    .badge {
      display: inline-block;
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-new-ip    { background: #3a2c00; color: var(--yellow); }
    .badge-traffic   { background: #0d2033; color: var(--blue); }
    .badge-existing  { background: #1a1a2e; color: var(--purple); }

    .proto-tcp  { color: var(--green); }
    .proto-udp  { color: var(--orange); }
    .proto-tls  { color: var(--purple); }
    .proto-http { color: var(--blue); }
    .proto-other{ color: var(--muted); }

    .highlight { animation: flash 0.8s ease-out; }
    @keyframes flash {
      0%   { background: #1a2c1a; }
      100% { background: transparent; }
    }

    /* Column widths */
    th:nth-child(1), td:nth-child(1) { width: 70px; }   /* type */
    th:nth-child(2), td:nth-child(2) { width: 145px; }  /* time */
    th:nth-child(3), td:nth-child(3) { width: 60px; }   /* transport */
    th:nth-child(4), td:nth-child(4) { width: 60px; }   /* protocol */
    th:nth-child(5), td:nth-child(5) { width: 165px; }  /* src */
    th:nth-child(6), td:nth-child(6) { width: 165px; }  /* dst */
    th:nth-child(7), td:nth-child(7) { width: 65px; }   /* len */
    th:nth-child(8), td:nth-child(8) { width: auto; }   /* sni / extra */

    /* ── Footer ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 5px 16px;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      display: flex;
      gap: 20px;
    }
  </style>
</head>
<body>

<header>
  <div class="status-dot" id="dot"></div>
  <h1>Network Monitor</h1>
  <div class="stat-chips">
    <div class="chip">Packets <span id="stat-total">0</span></div>
    <div class="chip">New IPs <span id="stat-ips">0</span></div>
    <div class="chip">Shown <span id="stat-shown">0</span> / 500</div>
  </div>
</header>

<div id="ip-bar">
  <span class="label">Tracked IPs:</span>
  <span id="ip-tags" style="display:contents"></span>
  <span id="ip-none" style="color:var(--muted);font-size:11px">none yet</span>
</div>

<div id="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Type</th>
        <th>Time</th>
        <th>Transport</th>
        <th>Protocol</th>
        <th>Source</th>
        <th>Destination</th>
        <th>Bytes</th>
        <th>SNI / Info</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer>
  <span id="footer-status">Connecting to server…</span>
  <span>Max 500 entries (oldest removed automatically)</span>
</footer>

<script>
  const MAX = 500;
  const tbody = document.getElementById("tbody");
  const dot = document.getElementById("dot");
  const statTotal = document.getElementById("stat-total");
  const statIps = document.getElementById("stat-ips");
  const statShown = document.getElementById("stat-shown");
  const ipTagsEl = document.getElementById("ip-tags");
  const ipNoneEl = document.getElementById("ip-none");
  const footerStatus = document.getElementById("footer-status");

  let totalPackets = 0;
  const knownIps = new Set();
  let autoScroll = true;

  // ── Track scroll intent ──────────────────────────────────────────
  const wrapper = document.getElementById("table-wrapper");
  wrapper.addEventListener("scroll", () => {
    const atBottom = wrapper.scrollHeight - wrapper.scrollTop - wrapper.clientHeight < 40;
    autoScroll = atBottom;
  });

  // ── Helpers ──────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function fmtTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleTimeString("en-US", { hour12: false }) +
             "." + String(d.getMilliseconds()).padStart(3, "0");
    } catch { return iso; }
  }

  function protoClass(proto) {
    const p = (proto || "").toUpperCase();
    if (p === "TCP") return "proto-tcp";
    if (p === "UDP") return "proto-udp";
    if (p.includes("TLS") || p.includes("SSL")) return "proto-tls";
    if (p.includes("HTTP")) return "proto-http";
    return "proto-other";
  }

  function formatAddr(ip, port) {
    if (!ip) return "—";
    if (port) return `${esc(ip)}:<span style="color:var(--muted)">${port}</span>`;
    return esc(ip);
  }

  function addIpTag(ip, source) {
    if (knownIps.has(ip)) return;
    knownIps.add(ip);
    ipNoneEl.style.display = "none";
    const tag = document.createElement("span");
    tag.className = "ip-tag";
    const srcLabel = source === "dns"
      ? ` <span style="opacity:.6;font-size:10px">dns</span>`
      : source === "sni"
      ? ` <span style="opacity:.6;font-size:10px">sni</span>`
      : "";
    tag.innerHTML = esc(ip) + srcLabel;
    tag.title = source ? `Discovered via ${source}` : ip;
    ipTagsEl.appendChild(tag);
    statIps.textContent = knownIps.size;
  }

  // ── Row builder ──────────────────────────────────────────────────
  function buildRow(d) {
    const tr = document.createElement("tr");
    tr.className = d.type === "new_ip" ? "new-ip highlight" : "traffic";

    let typeBadge, extraInfo = "";

    if (d.type === "new_ip") {
      typeBadge = `<span class="badge badge-new-ip">New IP</span>`;
      if (d.discovery_source === "dns" && d.dns_query) {
        extraInfo = `<span style="color:var(--orange)">DNS: ${esc(d.dns_query)}</span>`;
      } else if (d.sni) {
        extraInfo = `<span style="color:var(--yellow)">SNI: ${esc(d.sni)}</span>`;
      }
    } else if (d.type === "existing_ips") {
      return null; // handled separately
    } else {
      typeBadge = `<span class="badge badge-traffic">Traffic</span>`;
    }

    const proto = (d.protocol || "").toUpperCase();
    const transport = d.transport || "—";

    tr.innerHTML = `
      <td>${typeBadge}</td>
      <td style="color:var(--muted)">${fmtTime(d.timestamp)}</td>
      <td class="${protoClass(transport)}">${esc(transport)}</td>
      <td class="${protoClass(proto)}">${esc(proto)}</td>
      <td>${formatAddr(d.src_ip, d.src_port)}</td>
      <td>${formatAddr(d.dst_ip, d.dst_port)}</td>
      <td style="color:var(--muted);text-align:right">${d.length ?? "—"}</td>
      <td style="color:var(--muted)">${extraInfo}</td>
    `;
    return tr;
  }

  // ── Insert row, enforce 500 cap ──────────────────────────────────
  function insertRow(d) {
    if (d.type === "existing_ips") {
      (d.ips || []).forEach(ip => addIpTag(ip, null));
      return;
    }

    if (d.type === "new_ip" && d.discovered_ip) {
      addIpTag(d.discovered_ip, d.discovery_source);
    }

    totalPackets++;
    statTotal.textContent = totalPackets;

    const tr = buildRow(d);
    if (!tr) return;

    tbody.prepend(tr); // newest at top

    // Enforce max 500
    while (tbody.rows.length > MAX) {
      tbody.deleteRow(tbody.rows.length - 1);
    }
    statShown.textContent = tbody.rows.length;

    // Auto-scroll: since we prepend rows scroll is always near top
    // Only scroll to top if user hasn't scrolled down
    if (autoScroll) {
      wrapper.scrollTop = 0;
    }
  }

  // ── WebSocket ────────────────────────────────────────────────────
  function connect() {
    const wsUrl = `ws://${location.host}`;
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      dot.classList.add("connected");
      footerStatus.textContent = "Connected — receiving live traffic";
      console.log("WS connected");
    };

    ws.onmessage = (evt) => {
      let data;
      try { data = JSON.parse(evt.data); }
      catch { return; }
      insertRow(data);
    };

    ws.onclose = () => {
      dot.classList.remove("connected");
      footerStatus.textContent = "Disconnected — reconnecting in 3 s…";
      setTimeout(connect, 3000);
    };

    ws.onerror = (err) => {
      console.error("WS error", err);
      ws.close();
    };
  }

  connect();
</script>
</body>
</html>
